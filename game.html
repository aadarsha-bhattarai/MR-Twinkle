<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr Twinkie - Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <p><a href="menu.html">Back to menu</a></p>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ship = { x: canvas.width/2, y: canvas.height-30, width:20, height:30, dx:0, dy:0 };
        const bullets = [];
        const asteroids = [];
        let score = 0;
        function drawShip() {
            ctx.fillStyle = 'cyan';
            ctx.beginPath();
            ctx.moveTo(ship.x, ship.y);
            ctx.lineTo(ship.x-10, ship.y+20);
            ctx.lineTo(ship.x+10, ship.y+20);
            ctx.closePath();
            ctx.fill();
        }
        function drawBullets() {
            ctx.fillStyle = 'yellow';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, 2, 10));
        }
        function drawAsteroids() {
            ctx.fillStyle = 'gray';
            asteroids.forEach(a => ctx.beginPath(), ctx.arc(a.x, a.y, a.r,0,2*Math.PI), ctx.fill());
        }
        function update() {
            ship.x += ship.dx;
            ship.y += ship.dy;
            ship.x = Math.max(0, Math.min(canvas.width, ship.x));
            bullets.forEach((b,i)=>{ b.y-=5; if(b.y<0)bullets.splice(i,1); });
            asteroids.forEach((a,i)=>{ a.y+=a.speed; if(a.y>canvas.height){ asteroids.splice(i,1);} });
            // collision
            bullets.forEach((b,bi)=>{
                asteroids.forEach((a,ai)=>{
                    if(b.x>a.x-a.r && b.x<a.x+a.r && b.y>a.y-a.r && b.y<a.y+a.r){
                        asteroids.splice(ai,1);
                        bullets.splice(bi,1);
                        score+=10;
                    }
                });
            });
            // ship hit
            asteroids.forEach(a=>{
                if(Math.hypot(ship.x-a.x, ship.y-a.y)<a.r+10){
                    alert('Game over! Score: '+score);
                    window.location.href='menu.html';
                }
            });
        }
        function spawnAsteroid() {
            const r=10+Math.random()*20;
            asteroids.push({ x: Math.random()*canvas.width, y: -r, r, speed:1+Math.random()*2 });
        }
        function drawScore(){ ctx.fillStyle='white'; ctx.fillText('Score: '+score,10,20); }
        function loop() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawShip(); drawBullets(); drawAsteroids(); drawScore();
            update();
            requestAnimationFrame(loop);
        }
        document.addEventListener('keydown',e=>{
            if(e.key==='ArrowLeft') ship.dx=-3;
            if(e.key==='ArrowRight') ship.dx=3;
            if(e.key==='ArrowUp') ship.dy=-3;
            if(e.key==='ArrowDown') ship.dy=3;
            if(e.key===' ') bullets.push({x:ship.x,y:ship.y});
        });
        document.addEventListener('keyup',e=>{
            if(['ArrowLeft','ArrowRight'].includes(e.key)) ship.dx=0;
            if(['ArrowUp','ArrowDown'].includes(e.key)) ship.dy=0;
        });
        setInterval(spawnAsteroid,1000);
        ctx.font='16px Arial';
        loop();
    </script>
</body>
</html>
